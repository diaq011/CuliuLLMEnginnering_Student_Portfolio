<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>J人模拟器</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="page page-active" data-page="home">
      <header class="page-header">
        <img id="homeTitleImage" class="home-title-image" src="./assets/title-j-simulator.png" alt="J人模拟器">
      </header>
      <div class="card">
        <h2>专注</h2>
        <div id="timerDisplay" class="timer-display">00:00:00</div>
        <div class="timer-actions">
          <button id="timerToggleBtn" class="btn primary" type="button">开始</button>
          <button id="timerResetBtn" class="btn" type="button">重置</button>
        </div>
      </div>
      <div class="card">
        <h2>常用入口（占位）</h2>
        <div class="icon-grid">
          <div class="icon-item"><span>📅</span><p>日历</p></div>
          <div class="icon-item"><span>⏱️</span><p>专注</p></div>
          <div class="icon-item"><span>📝</span><p>笔记</p></div>
          <div class="icon-item"><span>📊</span><p>统计</p></div>
          <div class="icon-item"><span>🎯</span><p>目标</p></div>
          <div class="icon-item"><span>🧩</span><p>更多</p></div>
        </div>

        <div class="auth-box">
          <h3>账号登录</h3>
          <form id="authForm" class="auth-form">
            <input id="authUsername" type="text" placeholder="用户名（3-32位）" autocomplete="username" required>
            <input id="authPassword" type="password" placeholder="密码（至少6位）" autocomplete="current-password" required>
            <div class="auth-actions">
              <button id="loginBtn" class="btn small primary" type="submit">登录</button>
              <button id="registerBtn" class="btn small" type="button">注册</button>
              <button id="logoutBtn" class="btn small" type="button">退出</button>
            </div>
          </form>
          <p id="authStatus" class="hint">未登录</p>
        </div>
      </div>
    </section>

    <section class="page" data-page="timeline">
      <header class="page-header">
        <h1>时间轴</h1>
      </header>
      <div class="card date-switch-card">
        <div class="date-nav-row">
          <button id="prevDayBtn" class="btn small" type="button">‹ 前一天</button>
          <div id="selectedDateLabel" class="selected-date-label">--</div>
          <button id="nextDayBtn" class="btn small" type="button">后一天 ›</button>
        </div>
        <div id="weekStrip" class="week-strip"></div>
      </div>
      <div class="card">
        <div class="timeline-actions-row">
          <button id="generateBtn" class="btn generate-btn" type="button">
            <span class="btn-text">生成计划（全部任务）</span>
            <span id="generateSpinner" class="spinner" aria-hidden="true"></span>
          </button>
          <button id="planInfoBtn" class="btn info-btn" type="button" title="查看计划详情" aria-label="查看计划详情">i</button>
        </div>
        <p id="timelineHint" class="hint">双击任务块可标记完成并从时间轴移除。</p>
      </div>
      <div class="card timeline-card">
        <div id="timelineHeader" class="timeline-header"></div>
        <div id="timelineCanvas" class="timeline-canvas"></div>
      </div>
    </section>

    <section class="page" data-page="plan">
      <header class="page-header">
        <h1>计划列表</h1>
      </header>
      <div class="card">
        <form id="taskForm" class="form-grid">
          <label>
            任务名称
            <input id="titleInput" name="title" type="text" placeholder="例如：数学卷3张" required>
          </label>
          <label>
            截止日期
            <input id="deadlineInput" name="deadline" type="date" required>
          </label>
          <label>
            学科
            <select id="subjectInput" name="subject" required>
              <option value="math">数学</option>
              <option value="english">英语</option>
              <option value="chinese">语文</option>
              <option value="physics">物理</option>
              <option value="chemistry">化学</option>
              <option value="biology">生物</option>
              <option value="history">历史</option>
              <option value="politics">政治</option>
              <option value="geography">地理</option>
              <option value="general">综合/其他</option>
            </select>
          </label>
          <label>
            任务类型
            <select id="taskTypeInput" name="taskType" required>
              <option value="test_paper">试卷</option>
              <option value="exercise_set">习题/刷题</option>
              <option value="essay">作文/写作</option>
              <option value="reading">阅读</option>
              <option value="recitation">背诵</option>
              <option value="vocabulary">单词/词组</option>
              <option value="mistake_review">错题整理</option>
              <option value="chapter_review">章节复习</option>
              <option value="preview">预习</option>
              <option value="lab_report">实验报告</option>
              <option value="group_work">小组作业</option>
              <option value="presentation">展示/PPT</option>
            </select>
          </label>
          <label>
            难度
            <select id="difficultyInput" name="difficulty" required>
              <option value="easy">简单</option>
              <option value="medium" selected>普通</option>
              <option value="hard">困难</option>
            </select>
          </label>
          <label>
            预估时长（分钟，可选）
            <input id="estimateInput" name="estimate" type="number" min="1" placeholder="例如：90">
          </label>
          <button type="submit" class="btn primary">添加任务</button>
        </form>
      </div>
      <div class="card">
        <ul id="planList" class="list"></ul>
      </div>
    </section>

    <section class="page" data-page="settings">
      <header class="page-header">
        <h1>设置</h1>
      </header>
      <div id="settingsHome" class="settings-view card">
        <h2>设置分类</h2>
        <div class="settings-list">
          <button id="openAvailabilitySettingsBtn" class="settings-entry" type="button">
            <span>
              <strong>空闲时间段设置</strong>
              <span>管理每周可以安排学习任务的时间。</span>
            </span>
            <span class="settings-entry-arrow">›</span>
          </button>
        </div>
      </div>
      <div id="availabilitySettings" class="settings-view card" hidden>
        <div class="settings-detail-head">
          <button id="backSettingsBtn" class="btn small" type="button">‹ 返回</button>
          <h2>每周空闲时间段</h2>
        </div>
        <p class="hint">每个时段都支持：下拉选择或手动输入。输入会自动规范为 HH:MM。</p>
        <form id="availabilityForm" class="form-grid">
          <div class="availability-actions">
            <button id="copyWeekdaysBtn" class="btn" type="button">复制周一到周五</button>
            <button id="copyAllDaysBtn" class="btn" type="button">复制到全周</button>
          </div>
          <div id="availabilityEditor" class="availability-editor"></div>
          <button id="saveAvailabilityBtn" type="submit" class="btn primary">保存空闲时段</button>
        </form>
      </div>
    </section>

    <div id="feedbackBox" class="feedback" aria-live="polite"></div>
  </main>

  <section id="focusOverlay" class="focus-overlay hidden" aria-label="专注界面">
    <button id="focusMinimizeBtn" class="focus-icon-btn focus-minimize" type="button" aria-label="最小化专注界面">⌄</button>
    <button id="focusSettingsBtn" class="focus-icon-btn focus-settings" type="button" aria-label="专注设置">⚙</button>
    <div class="focus-center">
      <div id="focusClock" class="focus-clock">00:00:00</div>
      <button id="focusContentBtn" class="focus-content-btn" type="button">未填写</button>
      <div class="focus-actions">
        <button id="focusPauseBtn" class="btn" type="button">暂停</button>
        <button id="focusEndBtn" class="btn primary" type="button">结束</button>
      </div>
    </div>
  </section>

  <button id="focusBubble" class="focus-bubble hidden" type="button" aria-label="恢复专注界面">专</button>

  <div id="focusSettingsModal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-head">
        <h3>专注设置</h3>
        <button id="closeFocusSettingsBtn" class="btn small" type="button">关闭</button>
      </div>
      <div class="modal-body">
        <label class="radio-row">
          <input type="radio" name="focusDisplayMode" value="elapsed">
          显示计时器累积时长
        </label>
        <label class="radio-row">
          <input type="radio" name="focusDisplayMode" value="clock">
          显示实时时间
        </label>
      </div>
    </div>
  </div>

  <div id="planInfoModal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-head">
        <h3>计划详情</h3>
        <button id="closePlanInfoBtn" class="btn small" type="button">关闭</button>
      </div>
      <div class="modal-body">
        <h4>本次计划的理由与风险</h4>
        <p id="planReasonText">暂无</p>
        <ul id="planRiskList" class="list compact"></ul>
        <h4>任务时长估计原因</h4>
        <ul id="planEstimateList" class="list compact"></ul>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item nav-active" data-nav="home" type="button"><span>🏠</span><em>主页</em></button>
    <button class="nav-item" data-nav="timeline" type="button"><span>🕒</span><em>时间轴</em></button>
    <button class="nav-item" data-nav="plan" type="button"><span>📋</span><em>计划列表</em></button>
    <button class="nav-item" data-nav="settings" type="button"><span>⚙️</span><em>设置</em></button>
  </nav>

  <datalist id="timeOptions"></datalist>
  <script src="./app.js"></script>
</body>
</html>
